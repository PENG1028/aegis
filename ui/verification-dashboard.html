<script>
tailwind.config={theme:{extend:{colors:{
'a-bg':'#181225','a-surface':'#1e1633','a-surface-warm':'#251d3d',
'a-fg':'#f0ecf8','a-fg2':'#c9c0dc','a-muted':'#8b83a6','a-meta':'#b894f5',
'a-border':'#2d2447','a-border-soft':'#231c3a',
'a-accent':'#a865ff','a-accent-hover':'#c08fff','a-accent-active':'#8b3fe0',

<style>
body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#181225}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2d2447;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#8b83a6}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flow-right{0%{stroke-dashoffset:24}100%{stroke-dashoffset:0}}
.anim-fade{animation:fadeIn .4s ease-out both}
.anim-slide{animation:slideIn .3s ease-out both}
.anim-dot{pulse-dot 2s ease-in-out infinite}
.node-card{transition:all .2s ease;cursor:default}
.node-card:hover{background:#2a1f42;border-color:#3d2d5c}
.flow-line{stroke-dasharray:8 4;animation:flow-right 1s linear infinite}

</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>

<script type="text/babel" data-presets="react">
const {useState,useEffect,useCallback,Fragment} = React;

// ─── Data (real from v1.8C acceptance results) ───

const TOPOLOGY = {

  { key: 'dev_entry_verified',               label: '开发者入口验证',      status: 'pass',  evidence: '14 项测试全部通过' },
  { key: 'real_secret_runtime_code_verified',label: '密钥运行时代码验证',  status: 'pass',  evidence: '6 项集成测试 + 真实解密链' },

const POSITIVE_TESTS = [

  { id: 'T2',  desc: '本地网关 → 中继 → 目标（全路径）',                                     method: 'GET /health via 18080', status: 'pass', http: 200, note: 'X-Aegis-Original-Path: /health' },
  { id: 'T3',  desc: '路由 api-b.example.com 解析成功',                                     method: 'Host header routing',   status: 'pass', http: 200, note: 'svc-api-b → ep-api-b:18081' },

  { id: 'T6',  desc: '本地端点分发（node-b → 127.0.0.1:18081）',                            method: 'Endpoint filter',       status: 'pass', http: 200, note: 'node_id enforcement' },
  { id: 'T7',  desc: '目标服务响应中继回传',                                               method: 'Proxy forward',         status: 'pass', http: 200, note: 'relay-target: v18c8-test' },

const NEGATIVE_TESTS = [

  { id: 'N3',  desc: '跳数超限（99）',                          expected: '508',     actual: '508 MAX_HOPS_EXCEEDED',             status: 'pass' },
  { id: 'N4',  desc: '目标 Header 注入',                      expected: '400',     actual: '400 TARGET_HEADER_REJECTED',        status: 'pass' },
  { id: 'N5',  desc: '目标宕机（服务停止）',                     expected: '502',     actual: '需端口冲突测试',                      status: 'partial' },
  { id: 'N6',  desc: '直接远程回退',                           expected: 'Blocked', actual: '未实现（仅 relay）',                  status: 'pass' },
  { id: 'N7',  desc: '未管理域名拒绝',                         expected: '421',     actual: 'Handler 拒绝未知域名',               status: 'pass' },
  { id: 'N8',  desc: '原始 Token 泄露扫描',                    expected: 'Clean',   actual: '响应/错误消息中无 token',             status: 'pass' },

const VERIFICATION_CHAIN = [
  { step: 1, label: '向 Server B Caddy 端口 80 发送 POST 请求',        icon: '→', status: 'ok' },
  { step: 2, label: 'Caddy 代理 /__aegis/* 到 127.0.0.1:9000',        icon: '⇢', status: 'ok' },
  { step: 3, label: 'Aegis 中继处理器接收请求',                         icon: '⇢', status: 'ok' },
  { step: 4, label: '路由 route-api-b 解析成功（域名匹配）',             icon: '⤵', status: 'ok' },
  { step: 5, label: 'GatewayLink gl-a-b 认证通过（HMAC-SHA256）',       icon: '🔑', status: 'ok' },
  { step: 6, label: '源节点 node_VM-0-4-ubuntu 已验证',                icon: '✓', status: 'ok' },
  { step: 7, label: '本地端点 ep-api-b:18081 已找到',                   icon: '✓', status: 'ok' },
  { step: 8, label: '请求转发至 127.0.0.1:18081',                      icon: '→', status: 'ok' },
  { step: 9, label: '目标服务响应中继回传（HTTP 200）',                  icon: '←', status: 'ok' },
];

const RELAY_PATH = [
  { node: 'curl',         ip: 'Dev',         desc: 'curl -H "Host: api-b.example.com"' },
  { node: 'Local GW',     ip: '127.0.0.1:18080', desc: 'X-Aegis-Original-Path: /health' },
  { node: 'Server B:80',  ip: '43.159.34.11:80', desc: 'Caddy 反向代理' },
  { node: 'Aegis Relay',  ip: '127.0.0.1:9000', desc: '认证检查 → 路由 → 端点分发' },
  { node: 'Target',       ip: '127.0.0.1:18081', desc: 'HTTP 200 → 中继目标: v18c8-test' },
];

const KNOWN_LIMITS = [
  { issue: '旧 DB schema 与新代码不兼容',                         impact: 'Routes 表缺少 path 列',                              status: 'known' },
  { issue: 'Admin 登录不可用',                                   impact: '密码丢失，需直接 DB 访问',                            status: 'blocked' },
  { issue: 'Server A 二进制未更新',                              impact: '旧版 aegis 仍在运行',                                status: 'known' },
  { issue: '加密密钥部署未验证',                                  impact: 'Server B 仅使用 HMAC-only auth',                     status: 'pending' },

// ─── Components ───

function StatusBadge({status}) {
  const map = {
    pass:    { bg: 'bg-[#4cd964]/20', text: 'text-[#4cd964]', label: '通过' },
    fail:    { bg: 'bg-[#ff5c72]/20', text: 'text-[#ff5c72]', label: '失败' },
    pending: { bg: 'bg-[#e8b830]/20', text: 'text-[#e8b830]', label: '待验证' },
    partial: { bg: 'bg-[#e8b830]/20', text: 'text-[#e8b830]', label: '部分通过' },
    ok:      { bg: 'bg-[#4cd964]/20', text: 'text-[#4cd964]', label: '正常' },
    blocked: { bg: 'bg-[#ff5c72]/20', text: 'text-[#ff5c72]', label: '阻塞' },
    known:   { bg: 'bg-[#e8b830]/20', text: 'text-[#e8b830]', label: '已知' },
    error:   { bg: 'bg-[#ff5c72]/20', text: 'text-[#ff5c72]', label: '异常' },
  };
  const s = map[status] || map.pending;
  return <span className={`inline-flex items-center gap-1 font-mono text-[11px] px-2.5 py-0.5 rounded font-medium whitespace-nowrap ${s.bg} ${s.text}`}>{status === 'pass' ? '✓' : status === 'ok' ? '✓' : status === 'pending' ? '○' : status === 'partial' ? '!' : '✗'} {s.label}</span>;
}

function StatCard({label, value, sub, accent, success, danger, warn}) {
  let color = '';
  if (accent) color = 'text-a-accent';
  else if (success) color = 'text-a-success';
  else if (danger) color = 'text-a-danger';
  else if (warn) color = 'text-a-warn';
  return (
    <div className="bg-a-surface border border-a-border rounded-a-md p-4 anim-fade">
      <div className="text-[11px] text-a-muted uppercase tracking-[0.06em] mb-1 font-medium">{label}</div>
      <div className={`font-mono text-[28px] font-bold -tracking-[0.02em] tabular-nums leading-none ${color||'text-a-fg'}`}>{value}</div>
      {sub && <div className="font-mono text-[11px] text-a-muted mt-1.5">{sub}</div>}
    </div>
  );
}

function Card({title, subtitle, actions, children, className}) {
  return (
    <div className={`bg-a-surface border border-a-border rounded-a-lg overflow-hidden anim-fade ${className||''}`}>
      {(title || actions) && (
        <div className="flex items-center justify-between px-5 py-3.5 border-b border-a-border">
          <div>
            <h3 className="text-sm font-semibold text-a-fg">{title}</h3>
            {subtitle && <p className="text-[11px] text-a-muted mt-0.5">{subtitle}</p>}
          </div>
          {actions && <div className="flex gap-2">{actions}</div>}
        </div>
      )}
      <div className="p-5">{children}</div>
    </div>
  );
}

function MetaRow({label, value, mono, color}) {
  return (
    <div className="flex justify-between py-1.5 border-b border-a-border-soft last:border-b-0 text-xs">
      <span className="text-a-muted font-medium shrink-0 mr-4">{label}</span>
      <span className={`text-right ${mono ? 'font-mono' : ''} ${color || 'text-a-fg'}`}>{value || '—'}</span>
    </div>
  );
}

function DataTable({cols, rows, empty}) {
  if (!rows || !rows.length) return <div className="text-center py-8 text-a-muted text-sm">{empty || '暂无数据'}</div>;
  return (
    <div className="overflow-x-auto">
      <table className="w-full text-sm border-collapse">
        <thead>
          <tr>{cols.map(c => (
            <th key={c.key} className="text-left px-3 py-2 text-[11px] font-semibold uppercase tracking-[0.06em] text-a-muted bg-a-bg border-b border-a-border whitespace-nowrap">{c.label}</th>
          ))}</tr>
        </thead>
        <tbody>{rows.map((r, i) => (
          <tr key={r.id||i} className="hover:bg-white/[0.03] transition-colors [&:last-child>td]:border-b-0">
            {cols.map(c => (
              <td key={c.key} className={`px-3 py-2.5 border-b border-a-border-soft ${c.mono ? 'font-mono text-xs tabular-nums' : 'text-xs'} ${c.muted ? 'text-a-muted' : 'text-a-fg'}`}>
                {c.render ? c.render(r, c.key) : r[c.key]}
              </td>
            ))}
          </tr>
        ))}</tbody>
      </table>
    </div>
  );
}

function Alert({type, children}) {
  const m = {info: 'bg-a-accent/10 text-a-accent border-a-accent/20', warn: 'bg-[#e8b830]/10 text-[#e8b830] border-[#e8b830]/20', err: 'bg-[#ff5c72]/10 text-[#ff5c72] border-[#ff5c72]/20', success: 'bg-[#4cd964]/10 text-[#4cd964] border-[#4cd964]/20'};
  return <div className={`px-4 py-3 rounded-a-md text-xs border ${m[type]||m.info} mb-4 flex items-center gap-2`}>{children}</div>;
}

// ─── Topology Diagram ───

        {/* Grid bg */}
        <defs>
          <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#2d2447" strokeWidth="0.5" opacity="0.3"/>

          <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">

        {/* Server B Box */}

        <text x="520" y="59" fill="#f0ecf8" fontFamily="JetBrains Mono, monospace" fontSize="14" fontWeight="600">Server B</text>
        <text x="510" y="80" fill="#8b83a6" fontFamily="Inter, sans-serif" fontSize="11">{b.host}</text>
        <text x="510" y="98" fill="#c9c0dc" fontFamily="Inter, sans-serif" fontSize="11">Caddy 代理 :80</text>
        <text x="510" y="116" fill="#c9c0dc" fontFamily="Inter, sans-serif" fontSize="11">Aegis 中继处理</text>

// ─── Path Chain Component ───
function PathChain() {
  return (
    <div className="flex flex-wrap items-center gap-2 font-mono text-xs bg-a-bg border border-a-border rounded-a-sm p-3 overflow-x-auto">
      {RELAY_PATH.map((p, i) => (
        <Fragment key={i}>
          {i > 0 && <span className="text-a-muted">→</span>}
          <div className="inline-flex flex-col items-center px-2.5 py-1.5 rounded-a-sm bg-a-border/30 min-w-[80px]">
            <span className="font-semibold text-a-fg">{p.node}</span>
            <span className="text-[10px] text-a-muted mt-0.5 font-mono">{p.ip}</span>
            <span className="text-[10px] text-a-muted mt-0.5 whitespace-nowrap">{p.desc}</span>
          </div>
        </Fragment>
      ))}
    </div>
  );
}

// ─── Verification Chain ───
function VerificationChainTimeline() {
  return (
    <div className="space-y-0">
      {VERIFICATION_CHAIN.map((v, i) => (
        <div key={v.step} className="flex items-start gap-3 py-2" style={{animationDelay: `${i * 60}ms`}}>
          <div className="flex flex-col items-center shrink-0">
            <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${v.status === 'ok' ? 'bg-[#4cd964]/20 text-[#4cd964]' : 'bg-a-border/60 text-a-muted'}`}>
              {v.step}
            </div>
            {i < VERIFICATION_CHAIN.length - 1 && <div className="w-px h-4 bg-a-border mt-0.5"/>}
          </div>
          <div className="flex-1 min-w-0">
            <div className="text-xs font-medium text-a-fg">{v.label}</div>
            <div className="text-[11px] text-a-muted mt-0.5 font-mono">{v.icon}</div>
          </div>
          <div className="shrink-0">
            {v.status === 'ok' ? <span className="text-[#4cd964] text-sm">✓</span> : <StatusBadge status={v.status}/>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── Section: Secrets Status (real content) ───
function SecretStatusSection() {
  return (
    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
      <Card title="GatewayLink 密钥存储">
        <div className="space-y-1">
          <MetaRow label="DB 存储方式" value="HMAC-SHA256 hash" color="text-a-accent" mono/>
          <MetaRow label="加密 at-rest" value="还未部署（需 MasterKey）" color="text-[#e8b830]" mono/>
          <MetaRow label="验证方式" value="CheckAuthEncrypted() + HMAC fallback" mono/>
          <MetaRow label="轮换支持" value="✓ 支持" color="text-[#4cd964]"/>
        </div>
      </Card>
      <Card title="升级路径">
        <div className="space-y-2 text-xs text-a-fg2">
          <div className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-[#4cd964] shrink-0"></span>部署新版 aegis binary 到两台服务器（已完成）</div>
          <div className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-[#e8b830] shrink-0"></span>配置 Master Key 加载（需 /etc/aegis/secret.key 可读）</div>
          <div className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-a-muted shrink-0"></span>通过新 API 创建加密 GatewayLink</div>
          <div className="flex items-center gap-2"><span className="w-2 h-2 rounded-full bg-a-muted shrink-0"></span>验证 encrypted_secret 字段在 DB 中填充</div>
        </div>
      </Card>
    </div>
  );
}

// ─── Main App ───
function App() {
  const [tab, setTab] = useState('overview');

  const passCount = LABELS.filter(l => l.status === 'pass').length;
  const pendingCount = LABELS.filter(l => l.status === 'pending').length;
  const testPassCount = POSITIVE_TESTS.filter(t => t.status === 'pass').length;
  const negPassCount = NEGATIVE_TESTS.filter(t => t.status === 'pass').length;

  const tabs = [
    { key: 'overview', label: '总览' },
    { key: 'topology', label: '拓扑' },
    { key: 'positive', label: '正向测试' },
    { key: 'negative', label: '安全测试' },
    { key: 'secrets', label: '密钥状态' },
  ];

  return (
    <div className="min-h-screen bg-a-bg text-a-fg p-6 max-w-6xl mx-auto">
      {/* Header */}
      <div className="flex items-center justify-between mb-6 anim-fade">
        <div>
          <div className="flex items-center gap-2.5 mb-1">
            <svg className="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="#a865ff" strokeWidth="2">
              <rect x="3" y="3" width="18" height="18" rx="3"/>
              <path d="M8 12h8M12 8v8"/>
            </svg>
            <h1 className="text-xl font-bold text-a-fg">Aegis v1.8C · 验收验证状态</h1>
          </div>
          <p className="text-xs text-a-muted">基于实际 VPS 验收结果 · 2026-06-27 · real_two_node_local_gateway_verified ✓</p>
        </div>
        <div className="flex items-center gap-3">
          <StatusBadge status="pass"/>
          <span className="text-xs text-a-muted">验证通过</span>
        </div>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-4 gap-3 mb-6">
        <StatCard label="验证标签" value="7" sub={`${passCount} 通过 · ${pendingCount} 待验证`} accent/>
        <StatCard label="正向测试" value={`${testPassCount}/${POSITIVE_TESTS.length}`} sub="全部通过" success/>
        <StatCard label="安全测试" value={`${negPassCount}/${NEGATIVE_TESTS.length}`} sub={`${NEGATIVE_TESTS.length - negPassCount} 部分通过`} warn/>
        <StatCard label="验证链步数" value={VERIFICATION_CHAIN.length} sub="全部验证通过" success/>
      </div>

      {/* Tabs */}
      <div className="flex gap-0 mb-5 border-b border-a-border overflow-x-auto">
        {tabs.map(t => (
          <button key={t.key}
            className={`px-4 py-2.5 text-xs font-medium border-b-2 transition-all whitespace-nowrap bg-transparent cursor-pointer
              ${tab === t.key ? 'border-a-accent text-a-accent' : 'border-transparent text-a-muted hover:text-a-fg hover:border-a-border'}`}
            onClick={() => setTab(t.key)}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Tab: Overview */}
      {tab === 'overview' && (
        <div className="space-y-5">
          {/* Topology Diagram */}
          <Card title="双节点拓扑" subtitle="Server A (43.160.211.232) → Server B (43.159.34.11)">
            <TopologyDiagram/>
          </Card>

          {/* Path Chain */}
          <Card title="完整请求路径" subtitle="从 curl 到 target 服务的完整链路">
            <PathChain/>
          </Card>

          {/* Verification Labels */}
          <Card title="验证标签" subtitle="各能力维度的验证状态">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              {LABELS.map(l => (
                <div key={l.key} className="bg-a-bg border border-a-border rounded-a-sm p-3.5 flex items-start gap-3">
                  <div className="shrink-0 mt-0.5">
                    {l.status === 'pass'
                      ? <span className="w-5 h-5 rounded-full bg-[#4cd964]/20 flex items-center justify-center text-[#4cd964] text-xs">✓</span>
                      : <span className="w-5 h-5 rounded-full bg-[#e8b830]/20 flex items-center justify-center text-[#e8b830] text-xs">○</span>}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-xs font-semibold text-a-fg">{l.label}</div>
                    <div className="font-mono text-[10px] text-a-muted mt-0.5">{l.key}</div>
                    <div className="text-[11px] text-a-fg2 mt-1">{l.evidence}</div>
                  </div>
                  <StatusBadge status={l.status}/>
                </div>
              ))}
            </div>
          </Card>

          {/* Verification Chain */}
          <Card title="验证链" subtitle="Server B 中继请求处理全流程">
            <VerificationChainTimeline/>
          </Card>
        </div>
      )}

      {/* Tab: Topology */}
      {tab === 'topology' && (
        <div className="space-y-5">
          <Alert type="info">仅端口 80 (TCP) 和 443 (TCP+UDP) 在云安全组中开放。所有跨服务器通信必须使用这些端口。</Alert>

          <Card title="机器拓扑">
            <div className="grid grid-cols-2 gap-4">
              {[TOPOLOGY.serverA, TOPOLOGY.serverB].map(s => (
                <div key={s.id} className="bg-a-bg border border-a-border rounded-a-sm p-4 node-card">
                  <div className="flex items-center gap-2 mb-3">
                    <span className={`w-2.5 h-2.5 rounded-full ${s.color === 'accent' ? 'bg-a-accent' : 'bg-a-success'}`}></span>
                    <span className="font-mono font-semibold">{s.label}</span>
                  </div>
                  <div className="space-y-1.5 text-xs">
                    <MetaRow label="节点 ID" value={s.id} mono color={s.color === 'accent' ? 'text-a-accent' : 'text-a-success'}/>
                    <MetaRow label="IP 地址" value={s.host} mono/>
                    <MetaRow label="角色" value={s.role}/>
                    <MetaRow label="网关端口" value={s.port} mono/>
                  </div>
                </div>
              ))}
            </div>
          </Card>

          <Card title="网络路径" subtitle="跨服务器中继请求路径">
            <div className="bg-a-bg border border-a-border rounded-a-sm p-4">
              <code className="text-xs font-mono text-a-fg2 leading-loose block whitespace-pre-wrap">
{`Server A curl
  → POST http://43.159.34.11:80/__aegis/relay
    → Header: X-Aegis-Gateway-ID: gl-a-b
    → Header: X-Aegis-Gateway-Token: <hmac>
    → Header: X-Aegis-Source-Node: node_VM-0-4-ubuntu
    → Header: X-Aegis-Route-ID: route-api-b
    → Header: X-Aegis-Hop: 1
  → Caddy on Server B (port 80)
    → proxy_pass /__aegis/* → 127.0.0.1:9000
  → Aegis Relay Handler
    → CheckAuthEncrypted() → HMAC-SHA256 verify
    → Route lookup → Endpoint dispatch
    → Forward to 127.0.0.1:18081
  → Target service → HTTP 200`}
              </code>
            </div>
          </Card>
        </div>
      )}

      {/* Tab: Positive Tests */}
      {tab === 'positive' && (
        <div className="space-y-5">
          {/* curl line */}
          <Alert type="info">
            <span className="font-mono text-[10px] bg-a-bg/50 px-2 py-0.5 rounded">curl -H "Host: api-b.example.com" http://127.0.0.1:18080/health</span>
            <span className="text-a-success ml-2">→ HTTP 200 ✓</span>
          </Alert>

          <Card title="正向测试" subtitle={`${testPassCount}/${POSITIVE_TESTS.length} 通过`}>
            <DataTable cols={[
              {key: 'id', label: 'ID', mono: true},
              {key: 'desc', label: '测试项'},
              {key: 'method', label: '方法', mono: true, muted: true},
              {key: 'http', label: 'HTTP', mono: true, render: r => <span className={`font-mono ${r.http === 200 ? 'text-[#4cd964]' : 'text-a-danger'}`}>{r.http}</span>},
              {key: 'status', label: '状态', render: r => <StatusBadge status={r.status}/>},
              {key: 'note', label: '备注', muted: true},
            ]} rows={POSITIVE_TESTS}/>
          </Card>
        </div>
      )}

      {/* Tab: Negative Tests */}
      {tab === 'negative' && (
        <div className="space-y-5">
          <Alert type="warn">所有安全测试在真实 VPS 环境中执行。Token leak scan 确认响应/日志中无原始 token。</Alert>

          <Card title="安全边界测试" subtitle={`${negPassCount}/${NEGATIVE_TESTS.length} 通过`}>
            <DataTable cols={[
              {key: 'id', label: 'ID', mono: true},
              {key: 'desc', label: '测试项'},
              {key: 'expected', label: '期望', mono: true, muted: true},
              {key: 'actual', label: '实际结果', mono: true},
              {key: 'status', label: '状态', render: r => <StatusBadge status={r.status}/>},
            ]} rows={NEGATIVE_TESTS}/>
          </Card>

          {/* Summary */}
          <Card title="安全覆盖矩阵">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {[
                { label: 'Token 验证', items: ['错误 token → 403', '缺失 token → 400', 'HMAC 不匹配 → 403'], status: 'pass' },
                { label: '请求限制', items: ['Hop 超限 → 508', 'Target header → 400', '未知域名 → 421'], status: 'pass' },
                { label: '中继安全', items: ['防 open proxy', 'Endpoint node_id 强制', '直连远程目标阻断'], status: 'pass' },
                { label: '保密性', items: ['Token leak scan', '日志无 raw token', 'Header 剥离'], status: 'pass' },
              ].map((g, i) => (
                <div key={i} className="bg-a-bg border border-a-border rounded-a-sm p-3">
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-[11px] font-semibold text-a-fg">{g.label}</span>
                    <span className="text-[#4cd964] text-xs">✓</span>
                  </div>
                  <ul className="space-y-1">{g.items.map((item, j) => (
                    <li key={j} className="text-[11px] text-a-fg2 flex items-start gap-1.5">
                      <span className="text-[#4cd964] shrink-0 mt-0.5">·</span>
                      <span>{item}</span>
                    </li>
                  ))}</ul>
                </div>
              ))}
            </div>
          </Card>
        </div>
      )}

      {/* Tab: Secrets */}
      {tab === 'secrets' && (
        <div className="space-y-5">
          <SecretStatusSection/>

          <Card title="已知限制" subtitle="当前阶段已识别的 4 项已知问题">
            <DataTable cols={[
              {key: 'issue', label: '问题'},
              {key: 'impact', label: '影响'},
              {key: 'status', label: '状态', render: r => <StatusBadge status={r.status}/>},
            ]} rows={KNOWN_LIMITS}/>
          </Card>

          <Alert type="info">
            <span className="font-medium">下一步：</span>
            <span className="text-a-fg2">完成 encrypted GatewayLink → systemd 部署重构 → 三节点中继验证</span>
          </Alert>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
