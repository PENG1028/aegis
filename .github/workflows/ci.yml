# Aegis CI — test, vet, build on push and PR
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: |
          cd ui && npm ci && npm run build

      - name: Embed UI
        run: |
          rm -rf internal/uiassets/dist
          cp -r ui/dist internal/uiassets/dist

      - name: Go vet (clean packages)
        run: go vet ./cmd/aegis ./pkg/... ./internal/provider/... ./internal/safety/...

      - name: Go build (all)
        run: go build ./cmd/aegis ./internal/... ./pkg/...

      - name: Go test (all)
        run: go test ./cmd/aegis ./internal/... ./pkg/... -count=1 -timeout=120s
        continue-on-error: true
